<!doctype html>
<html lang="en">
  <head>
    <title>Dashboard</title>

    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Select2 CSS for Forms -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  </head>
  <body>
    <h1 class="mt-5">Update User</h1>
    <form method="post">
      <label for="username" class="form-label">Enter a username</label>
      <input type="text" id="username" class="form-control" required/><br />

      <div class="mb-3">
        <label for="lang" class="form-label">Favorite Programming Language:</label><br />
        <select id="lang" name="lang" class="form-select">
          {% for lang in languages}
            <option value="{{ lang }}">{{ lang }}</option>
          {% endfor %}
        </select>
      </div>

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
